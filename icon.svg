<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041828"/>
      <stop offset="100%" stop-color="#010D1E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Gold accent line top -->
  <rect x="40" y="22" width="432" height="7" rx="3.5" fill="#FFB800" opacity="0.5"/>

  <!-- Football outer ring -->
  <circle cx="256" cy="210" r="152" fill="#041828" stroke="#FFB800" stroke-width="9"/>

  <!-- Football black patches -->
  <!-- Center pentagon -->
  <polygon points="256,128 303,160 286,214 226,214 209,160" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>
  <!-- Upper-right -->
  <polygon points="303,160 362,152 380,200 340,230 286,214" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>
  <!-- Lower-right -->
  <polygon points="340,230 380,200 400,258 360,295 310,278" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>
  <!-- Bottom -->
  <polygon points="256,294 310,278 318,330 256,348 194,330 202,278" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>
  <!-- Lower-left -->
  <polygon points="172,230 202,278 152,295 112,258 132,200" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>
  <!-- Upper-left -->
  <polygon points="209,160 226,214 172,230 132,200 150,152" fill="#010D1E" stroke="#FFB800" stroke-width="5.5"/>

  <!-- 2026 -->
  <text x="256" y="430"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="104"
        fill="#FFB800"
        letter-spacing="4">2026</text>
  <!-- MUNDIAL -->
  <text x="256" y="474"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="32"
        fill="#5A8AAA"
        letter-spacing="10">MUNDIAL</text>
</svg>
